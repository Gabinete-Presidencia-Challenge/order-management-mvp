name: Frontend MFEs — CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  build-shell:
    name: Build shell-app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/shell-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/shell-app/package.json

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Upload shell build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shell-app-dist
          path: frontend/shell-app/dist/

  build-orders-mfe:
    name: Build orders-mfe
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/orders-mfe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/orders-mfe/package.json

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Verify remoteEntry.js is present
        run: test -f dist/remoteEntry.js && echo "remoteEntry.js found" || exit 1

      - name: Upload orders-mfe build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-mfe-dist
          path: frontend/orders-mfe/dist/
