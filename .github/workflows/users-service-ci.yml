name: Users Service — CI

on:
  push:
    paths:
      - "services/users-service/**"
      - ".github/workflows/users-service-ci.yml"
  pull_request:
    paths:
      - "services/users-service/**"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/users-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/users-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

    #  - name: Run tests with coverage
    #    run: |
    #      pytest app/tests/ -v --tb=short \
    #        --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: users-service-test-results
          path: services/users-service/test-results.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/users-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/

  build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t users-service:ci \
            ./services/users-service
