upstream orders_service {
    server orders-service:8001;
}

upstream users_service {
    server users-service:8002;
}

upstream shell_app {
    server shell-app:80;
}

upstream orders_mfe {
    server orders-mfe:80;
}

server {
    listen 8080;

    # Global CORS preflight
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Orders microservice ──────────────────────────────────────────────────
    location /api/orders/ {
        rewrite ^/api/orders/(.*)$ /$1 break;
        proxy_pass         http://orders_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Users / Auth microservice ────────────────────────────────────────────
    location /api/users/ {
        rewrite ^/api/users/(.*)$ /$1 break;
        proxy_pass         http://users_service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Orders MFE remote entry (Module Federation) ──────────────────────────
    location /remoteEntry.js {
        proxy_pass         http://orders_mfe;
        proxy_set_header   Host              $host;
        add_header         Cache-Control     "no-store, no-cache";
    }

    location /orders-mfe/ {
        proxy_pass         http://orders_mfe/;
        proxy_set_header   Host              $host;
    }

    # ── Shell / Host frontend ────────────────────────────────────────────────
    location / {
        proxy_pass         http://shell_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
